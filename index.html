# SK-B<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday SK 🎂</title>
<style>
body {

  align-items: center;

  background: white;

  text-align: center;

  animation: fadeIn 2s ease-in-out;

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);} 
  to { opacity: 1; transform: translateY(0);} 
}
h1 {
  color: #ff4d6d;
}
p {
  color: #333;
}
.btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
.hidden {
  display: none;
  margin-top: 20px;
}
</style>
</head>
